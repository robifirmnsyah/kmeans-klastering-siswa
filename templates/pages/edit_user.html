{% extends 'layouts/main.html' %}

{% block content %}
<div class="container-fluid d-flex justify-content-center">
    <div class="container card mt-3 p-4" style="max-width: 700px;">
        <h3 class="mb-3 text-center">Edit User</h3>
        <form method="POST">
            <!-- Baris untuk NIP dan Nama -->
            <div class="row mb-3">
                <div class="col d-flex justify-content-end">
                    <div>
                        <label for="nip" class="form-label">NIP</label>
                        <input type="text" class="form-control" id="nip" name="nip" required style="width: 300px;" value="{{ user.nip }}">
                    </div>
                </div>
                <div class="col d-flex justify-content-start">
                    <div>
                        <label for="nama" class="form-label">Nama</label>
                        <input type="text" class="form-control" id="nama" name="nama" required style="width: 300px;" value="{{ user.nama }}">
                    </div>
                </div>
            </div>

            <!-- Baris untuk Kelas dan Username -->
            <div class="row mb-3">
                <div class="col d-flex justify-content-end">
                    <div>
                        <label for="kelas" class="form-label">Kelas</label>
                        <input type="text" class="form-control" id="kelas" name="kelas" required style="width: 300px;" value="{{ user.kelas }}">
                    </div>
                </div>
                <div class="col d-flex justify-content-start">
                    <div>
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required style="width: 300px;" value="{{ user.username }}">
                    </div>
                </div>
            </div>

            <!-- Baris untuk Email dan Password -->
            <div class="row mb-3">
                <div class="col d-flex justify-content-end">
                    <div>
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required style="width: 300px;" value="{{ user.email }}">
                    </div>
                </div>
                <div class="col d-flex justify-content-start">
                    <div>
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required style="width: 300px;" value="{{ user.password }}">
                    </div>
                </div>
            </div>

            <!-- Baris untuk Role -->
            <div class="row mb-3 d-flex justify-content-center">
                <div style="margin-left: 20px;">
                    <label class="form-label">Role</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin" {% if user.role == 'admin' %}checked{% endif %}>
                        <label class="form-check-label" for="roleAdmin">Admin</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="role" id="roleUser" value="user" {% if user.role == 'user' %}checked{% endif %}>
                        <label class="form-check-label" for="roleUser">User</label>
                    </div>
                </div>
            </div>

            <!-- Baris untuk Button -->
            <div class="row mb-3 d-flex justify-content-center">
                <div>
                    <button type="submit" class="btn btn-primary" style="width: 100px;">Update</button>
                    <a href="{{ url_for('users') }}" class="btn btn-secondary" style="width: 100px; margin-left: 10px;">
                        Back
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
